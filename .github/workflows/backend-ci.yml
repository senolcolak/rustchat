name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Postgres service credentials
  POSTGRES_USER: rustchat
  POSTGRES_PASSWORD: password
  POSTGRES_DB: rustchat

jobs:
  test:
    name: cargo check + test
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://rustchat:password@localhost:5432/rustchat
      RUSTCHAT_DATABASE_URL: postgres://rustchat:password@localhost:5432/rustchat
      RUSTCHAT_JWT_SECRET: "test-secret"
      # S3 Configuration (Mock values for testing)
      RUSTCHAT_S3_ENDPOINT: "http://localhost:9000"
      RUSTCHAT_S3_BUCKET: "test-bucket"
      RUSTCHAT_S3_ACCESS_KEY: "minioadmin"
      RUSTCHAT_S3_SECRET_KEY: "minioadmin"
      RUSTCHAT_S3_REGION: "us-east-1"
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: rustchat
          POSTGRES_PASSWORD: password
          POSTGRES_DB: rustchat
        ports:
          - 5432:5432
        # Set health checks to wait until postgres is ready
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}

      - name: Wait for services
        run: |
          set -euo pipefail
          echo "::group::Waiting for Postgres"
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U "$POSTGRES_USER" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          pg_isready -h localhost -p 5432 -U "$POSTGRES_USER"
          echo "::endgroup::"
          echo "::group::Waiting for Redis"
          for i in {1..30}; do
            if redis-cli -h localhost -p 6379 ping >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          redis-cli -h localhost -p 6379 ping
          echo "::endgroup::"

      - name: Run cargo check
        run: |
          set -euo pipefail
          echo "::group::cargo check"
          cargo check
          echo "::endgroup::"

      - name: Run cargo test
        run: |
          set -euo pipefail
          echo "::group::cargo test"
          cargo test --no-fail-fast -- --nocapture
          echo "::endgroup::"
