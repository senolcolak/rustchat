name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Postgres service credentials - using default 'postgres' superuser
  POSTGRES_PASSWORD: password
  POSTGRES_DB: postgres

jobs:
  test:
    name: cargo check + test
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://postgres:password@localhost:5432/postgres
      RUSTCHAT_DATABASE_URL: postgres://postgres:password@localhost:5432/postgres
      RUSTCHAT_JWT_SECRET: "test-secret"
      # Test database URL (must be superuser-capable to create/drop test DBs)
      RUSTCHAT_TEST_DATABASE_URL: postgres://postgres:password@localhost:5432/postgres
      # S3 Configuration (Mock values for testing)
      RUSTCHAT_S3_ENDPOINT: "http://localhost:9000"
      RUSTCHAT_S3_BUCKET: "test-bucket"
      RUSTCHAT_S3_ACCESS_KEY: "minioadmin"
      RUSTCHAT_S3_SECRET_KEY: "minioadmin"
      RUSTCHAT_S3_REGION: "us-east-1"
    services:
      postgres:
        image: postgres:15
        env:
          # Using default 'postgres' superuser instead of creating a custom user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        # Set health checks to wait until postgres is ready
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rustfs:
        image: rustfs/rustfs:latest
        env:
          RUSTFS_ACCESS_KEY: minioadmin
          RUSTFS_SECRET_KEY: minioadmin
        ports:
          - 9000:9000

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install mold linker
        uses: rui314/setup-mold@v1

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}

      - name: Wait for services
        run: |
          set -euo pipefail
          echo "::group::Waiting for Postgres"
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U "postgres" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          pg_isready -h localhost -p 5432 -U "postgres"
          echo "::endgroup::"
          echo "::group::Waiting for Redis"
          for i in {1..30}; do
            if (echo > /dev/tcp/127.0.0.1/6379) >/dev/null 2>&1; then
              echo "Redis is accepting TCP connections"
              break
            fi
            sleep 1
          done
          if ! (echo > /dev/tcp/127.0.0.1/6379) >/dev/null 2>&1; then
            echo "Redis did not become ready in time" >&2
            exit 1
          fi
          echo "::endgroup::"
          echo "::group::Waiting for RustFS (S3)"
          for i in {1..60}; do
            if (echo > /dev/tcp/127.0.0.1/9000) >/dev/null 2>&1; then
              echo "RustFS endpoint is accepting TCP connections"
              break
            fi
            sleep 1
          done
          if ! (echo > /dev/tcp/127.0.0.1/9000) >/dev/null 2>&1; then
            echo "RustFS endpoint did not become ready in time" >&2
            exit 1
          fi
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:9000/health >/dev/null 2>&1; then
              echo "RustFS health endpoint is ready"
              break
            fi
            sleep 1
          done
          if ! curl -fsS http://127.0.0.1:9000/health >/dev/null 2>&1; then
            echo "RustFS health endpoint did not become ready in time" >&2
            exit 1
          fi
          echo "::endgroup::"

      - name: Run cargo check
        run: |
          set -euo pipefail
          echo "::group::cargo check"
          cargo check
          echo "::endgroup::"

      - name: Run cargo clippy
        run: |
          set -euo pipefail
          echo "::group::cargo clippy"
          cargo clippy --all-targets --all-features -- -D warnings
          echo "::endgroup::"

      - name: Run cargo test
        run: |
          set -euo pipefail
          echo "::group::cargo test"
          cargo test --no-fail-fast -- --nocapture
          echo "::endgroup::"
