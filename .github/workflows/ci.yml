name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rustchat
          POSTGRES_PASSWORD: rustchat
          POSTGRES_DB: rustchat
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rustfs:
        image: rustfs/rustfs:latest
        env:
          RUSTFS_ACCESS_KEY: minioadmin
          RUSTFS_SECRET_KEY: minioadmin
        ports:
          - 9000:9000

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install mold linker
        uses: rui314/setup-mold@v1

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Install SQLx CLI
        run: cargo install sqlx-cli --no-default-features --features postgres

      - name: Run migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://rustchat:rustchat@localhost:5432/rustchat
        run: sqlx migrate run

      - name: Check formatting
        working-directory: ./backend
        run: cargo fmt --all -- --check

      - name: Run clippy
        working-directory: ./backend
        run: cargo clippy --all-targets --all-features

      - name: Wait for RustFS (S3)
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:9000/health >/dev/null 2>&1; then
              echo "RustFS ready"; break
            fi
            sleep 1
          done

      - name: Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://rustchat:rustchat@localhost:5432/rustchat
          REDIS_URL: redis://localhost:6379/
          RUSTCHAT_TEST_DATABASE_URL: postgres://rustchat:rustchat@localhost:5432/rustchat
          RUSTCHAT_TEST_REDIS_URL: redis://localhost:6379/
          RUSTCHAT_S3_ENDPOINT: "http://localhost:9000"
          RUSTCHAT_S3_BUCKET: "test-bucket"
          RUSTCHAT_S3_ACCESS_KEY: "minioadmin"
          RUSTCHAT_S3_SECRET_KEY: "minioadmin"
          RUSTCHAT_S3_REGION: "us-east-1"
        run: cargo test

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install mold linker
        uses: rui314/setup-mold@v1

      - name: Build
        working-directory: ./backend
        run: cargo build --release
