# Fast development builds with BuildKit caching
# Usage: docker compose -f docker-compose.yml -f docker-compose.fast.yml up -d --build backend

services:
  backend:
    build:
      dockerfile: ../docker/backend.Dockerfile.optimized
      additional_contexts:
        cache: /tmp/docker-cache
      cache_from:
        - rustchat-backend:cache
      args:
        - BUILDKIT_INLINE_CACHE=1
