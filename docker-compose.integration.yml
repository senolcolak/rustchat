services:
  test-postgres:
    image: postgres:16-alpine
    container_name: rustchat-test-postgres
    environment:
      POSTGRES_USER: rustchat
      POSTGRES_PASSWORD: rustchat
      POSTGRES_DB: rustchat
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rustchat -d rustchat"]
      interval: 5s
      timeout: 5s
      retries: 20

  test-redis:
    image: redis:7-alpine
    container_name: rustchat-test-redis
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  test-s3:
    image: minio/minio:latest
    container_name: rustchat-test-s3
    command: server /data --address ":9000" --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "59000:9000"
      - "59001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
