services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    image: rustchat-backend
    container_name: rustchat-backend
    restart: always
    environment:
      - RUSTCHAT_SERVER_HOST=0.0.0.0
      - RUSTCHAT_SERVER_PORT=3000
      - RUSTCHAT_ENVIRONMENT=${RUSTCHAT_ENVIRONMENT:-development}
      - RUSTCHAT_CORS_ALLOWED_ORIGINS=${RUSTCHAT_CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:5173}
      - RUSTCHAT_DATABASE_URL=postgres://rustchat:rustchat@postgres:5432/rustchat
      - RUSTCHAT_REDIS_URL=redis://redis:6379
      - RUSTCHAT_JWT_SECRET=${RUSTCHAT_JWT_SECRET:?set RUSTCHAT_JWT_SECRET in .env}
      - RUSTCHAT_ENCRYPTION_KEY=${RUSTCHAT_ENCRYPTION_KEY:?set RUSTCHAT_ENCRYPTION_KEY in .env}
      - RUSTCHAT_S3_ENDPOINT=http://rustfs:9000
      - RUSTCHAT_S3_PUBLIC_ENDPOINT=https://s3.rustchat.io
      - RUSTCHAT_S3_BUCKET=rustchat-uploads
      - RUSTCHAT_S3_ACCESS_KEY=minioadmin
      - RUSTCHAT_S3_SECRET_KEY=minioadmin
      - RUSTCHAT_ADMIN_USER=${RUSTCHAT_ADMIN_USER:-admin@rustchat.local}
      - RUSTCHAT_ADMIN_PASSWORD=${RUSTCHAT_ADMIN_PASSWORD:-}
      # Calls Plugin (WebRTC) Configuration
      - RUSTCHAT_CALLS_ENABLED=${RUSTCHAT_CALLS_ENABLED:-true}
      - RUSTCHAT_CALLS_UDP_PORT=${RUSTCHAT_CALLS_UDP_PORT:-8443}
      - RUSTCHAT_CALLS_TCP_PORT=${RUSTCHAT_CALLS_TCP_PORT:-8443}
      - RUSTCHAT_CALLS_ICE_HOST_OVERRIDE=${RUSTCHAT_CALLS_ICE_HOST_OVERRIDE:-}
      - RUSTCHAT_CALLS_STATE_BACKEND=${RUSTCHAT_CALLS_STATE_BACKEND:-auto}
      # TURN Server Configuration
      - TURN_SERVER_ENABLED=${TURN_SERVER_ENABLED:-false}
      - TURN_SERVER_URL=${TURN_SERVER_URL:-turn:turn.kubedo.io:3478}
      - TURN_SERVER_USERNAME=${TURN_SERVER_USERNAME:-}
      - TURN_SERVER_CREDENTIAL=${TURN_SERVER_CREDENTIAL:-}
      # Push Notification Proxy
      - RUSTCHAT_PUSH_PROXY_URL=${RUSTCHAT_PUSH_PROXY_URL:-http://push-proxy:3000}
    ports:
      - "3000:3000"
      - "8443:8443/tcp" # WebRTC SFU TCP fallback
      - "8443:8443/udp" # WebRTC SFU UDP media transport
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/v1/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    image: rustchat-frontend
    container_name: rustchat-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: rustchat-postgres
    environment:
      POSTGRES_USER: rustchat
      POSTGRES_PASSWORD: rustchat
      POSTGRES_DB: rustchat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U rustchat" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rustchat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustchat-rustfs
    environment:
      - RUSTFS_ACCESS_KEY=minioadmin
      - RUSTFS_SECRET_KEY=minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console/UI
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc
    container_name: rustchat-createbuckets
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " /usr/bin/mc alias set rustchat http://rustfs:9000 minioadmin minioadmin; /usr/bin/mc mb --ignore-existing rustchat/rustchat-uploads; /usr/bin/mc anonymous set public rustchat/rustchat-uploads; exit 0; "

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: rustchat-meilisearch
    environment:
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: true
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    profiles:
      - search

  push-proxy:
    build:
      context: ./push-proxy
      dockerfile: Dockerfile
    image: rustchat-push-proxy
    container_name: rustchat-push-proxy
    restart: always
    environment:
      # Firebase (Android)
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-}
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/firebase-key.json
      # APNS (iOS VoIP) - JWT-based authentication
      - APNS_KEY_PATH=/secrets/apns-key.p8
      - APNS_KEY_ID=${APNS_KEY_ID:-}
      - APNS_TEAM_ID=${APNS_TEAM_ID:-}
      - APNS_BUNDLE_ID=${APNS_BUNDLE_ID:-}
      - APNS_USE_PRODUCTION=${APNS_USE_PRODUCTION:-false}
      # General
      - RUSTCHAT_PUSH_PORT=3000
      - RUST_LOG=push_proxy=info,tower_http=info
    volumes:
      # Firebase credentials
      - ${FIREBASE_KEY_PATH:-./secrets/firebase-key.json}:/secrets/firebase-key.json:ro
      # APNS Auth Key (JWT-based)
      - ${APNS_KEY_PATH:-./secrets/apns-key.p8}:/secrets/apns-key.p8:ro
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health 2>&1 | grep -q 'ok' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
  redis_data:
  rustfs_data:
  meilisearch_data:
