<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RustChat Messaging</title>
    <script>
      (function() {
        const allowedThemes = new Set([
          'light',
          'dark',
          'modern',
          'metallic',
          'futuristic',
          'high-contrast',
          'simple',
          'dynamic',
        ]);
        const darkThemes = new Set(['dark', 'futuristic', 'high-contrast', 'dynamic']);

        let theme = localStorage.getItem('theme');
        if (theme === 'system') {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        if (!allowedThemes.has(theme)) {
          theme = 'light';
        }

        const font = localStorage.getItem('chat_font');
        const allowedFonts = new Set([
          'inter',
          'figtree',
          'jetbrains-mono',
          'quicksand',
          'montserrat',
          'source-sans-3',
          'nunito',
          'manrope',
          'work-sans',
          'ibm-plex-sans',
        ]);
        const fontSize = Number(localStorage.getItem('chat_font_size'));
        const allowedSizes = new Set([13, 14, 16, 18, 20]);

        document.documentElement.setAttribute('data-theme', theme);
        if (darkThemes.has(theme)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }

        if (font && allowedFonts.has(font)) {
          document.documentElement.style.setProperty('--chat-font-family', `var(--font-${font})`);
        }
        if (allowedSizes.has(fontSize)) {
          document.documentElement.style.setProperty('--chat-font-size', `${fontSize}px`);
        }
      })();
    </script>
    <script src="https://meet.jit.si/external_api.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
