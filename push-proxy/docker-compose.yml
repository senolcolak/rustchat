version: '3.8'

services:
  push-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rustchat-push-proxy
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Firebase (Android) - Required for Android push support
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/firebase-key.json
      
      # APNS (iOS VoIP) - Required for iOS call support
      - APNS_CERT_PATH=${APNS_CERT_PATH:-/secrets/voip-cert.pem}
      - APNS_KEY_PATH=${APNS_KEY_PATH:-/secrets/voip-key.pem}
      - APNS_CERT_PASSWORD=${APNS_CERT_PASSWORD}
      - APNS_BUNDLE_ID=${APNS_BUNDLE_ID}
      - APNS_USE_PRODUCTION=${APNS_USE_PRODUCTION:-false}
      
      # General
      - RUSTCHAT_PUSH_PORT=${RUSTCHAT_PUSH_PORT:-3000}
      - RUST_LOG=${RUST_LOG:-push_proxy=info}
    volumes:
      # Mount Firebase service account key
      - ${FIREBASE_KEY_PATH:-./secrets/firebase-key.json}:/secrets/firebase-key.json:ro
      # Mount APNS certificates (if using iOS VoIP)
      - ${APNS_CERT_PATH:-./secrets/voip-cert.pem}:/secrets/voip-cert.pem:ro
      - ${APNS_KEY_PATH:-./secrets/voip-key.pem}:/secrets/voip-key.pem:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - rustchat-network

networks:
  rustchat-network:
    driver: bridge
